name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # CI: Run tests on every push and PR
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vyva_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/vyva_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          DEBUG: "true"
          # Add any other env vars your app needs for tests
        run: |
          pytest --cov=. --cov-report=term-missing -v

  # ─────────────────────────────────────────────
  # CD: Deploy to EC2 (only on push to master/main)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            cd ${{ secrets.APP_DIR }}

            echo "── Pulling latest code ──"
            git pull origin ${{ github.ref_name }}

            echo "── Activating virtual environment ──"
            source vyva_backend_env/bin/activate

            echo "── Installing dependencies ──"
            pip install -r requirements.txt --quiet

            echo "── Running database migrations ──"
            alembic upgrade head

            echo "── Restarting application services ──"
            sudo systemctl restart vyva
            sudo systemctl restart celery_worker
            sudo systemctl restart celery_beat

            echo "── Verifying services are running ──"
            sudo systemctl is-active --quiet vyva && echo "API: OK" || echo "API: FAILED"
            sudo systemctl is-active --quiet celery_worker && echo "Celery Worker: OK" || echo "Celery Worker: FAILED"

            echo "── Deploy complete ──"
