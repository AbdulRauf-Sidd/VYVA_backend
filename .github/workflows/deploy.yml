name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # CD: Deploy to EC2 on push to main
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            cd ${{ secrets.APP_DIR }}

            echo "── Pulling latest code ──"
            git pull origin ${{ github.ref_name }}

            echo "── Activating virtual environment ──"
            source vyva_backend_env/bin/activate

            echo "── Installing dependencies ──"
            pip install -r requirements.txt --quiet

            echo "── Running database migrations ──"
            alembic upgrade head

            echo "── Restarting application services ──"
            sudo systemctl restart vyva
            sudo systemctl restart celery_worker
            sudo systemctl restart celery_beat

            echo "── Verifying services are running ──"
            sudo systemctl is-active --quiet vyva && echo "API: OK" || echo "API: FAILED"
            sudo systemctl is-active --quiet celery_worker && echo "Celery Worker: OK" || echo "Celery Worker: FAILED"

            echo "── Deploy complete ──"
